name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      # Verify the frontend builds before pushing
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install & build frontend
        working-directory: ./app
        run: |
          npm ci
          npm run build

      # Push the full repo to HF Spaces — HF rebuilds the Docker image automatically
      - name: Push to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "ci@shopnow"
          git config user.name "ShopNow CI"
          git remote add hf https://shafi16:${HF_TOKEN}@huggingface.co/spaces/shafi16/ShopNow
          git push hf main --force
